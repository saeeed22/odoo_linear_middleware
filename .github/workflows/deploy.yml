name: Deploy to Staging

# Triggers:
#   push to main       -> automatic staging deploy
#   workflow_dispatch  -> manual redeploy from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

  deploy:
    name: Deploy to staging
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    # Serialise staging deploys so two pushes in quick succession don't race on
    # the remote host. Queued, not cancelled — every green commit ships.
    concurrency:
      group: deploy-staging
      cancel-in-progress: false

    env:
      APP_DIR: /home/${{ secrets.STAGING_SSH_USER }}/odoo-linear-middleware

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=()
          [ -n "${{ secrets.STAGING_SSH_HOST }}" ] || missing+=("STAGING_SSH_HOST")
          [ -n "${{ secrets.STAGING_SSH_USER }}" ] || missing+=("STAGING_SSH_USER")
          [ -n "${{ secrets.STAGING_SSH_KEY }}"  ] || missing+=("STAGING_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing required secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Create deployment tarball
        run: |
          set -euo pipefail
          TMP_TAR="$RUNNER_TEMP/deployment.tar.gz"
          # Exclude host-only artefacts and secrets. `.env` is never shipped —
          # the server owns its own copy — but `.env.example` stays in the tar.
          tar -czf "$TMP_TAR" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='coverage' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.staging' \
            --exclude='.env.production' \
            -C "$GITHUB_WORKSPACE" .
          mv "$TMP_TAR" "$GITHUB_WORKSPACE/deployment.tar.gz"
          ls -lh deployment.tar.gz

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload tarball
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/id_deploy \
              -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -P "${SSH_PORT:-22}" \
              deployment.tar.gz \
              "$SSH_USER@$SSH_HOST:/tmp/middleware-deploy.tar.gz"

      - name: Deploy on remote host
        env:
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          # Pipe the remote deploy script over stdin. APP_DIR is exported on
          # the remote shell before `bash -s` reads the script. ServerAlive*
          # keeps the SSH connection open during the potentially long
          # `docker compose build` on first deploy.
          ssh -i ~/.ssh/id_deploy \
              -o IdentitiesOnly=yes \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=10 \
              -p "${SSH_PORT:-22}" \
              "$SSH_USER@$SSH_HOST" \
              "APP_DIR='${{ env.APP_DIR }}' bash -s" \
              < scripts/deploy-remote.sh

      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
