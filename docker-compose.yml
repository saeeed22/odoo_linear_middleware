# Canonical Compose file — full stack with Postgres inside Compose.
#
# This is the default for deployments, CI, and any machine that doesn't
# already have Postgres installed. It brings up app, worker, redis, and a
# containerised postgres with a persistent named volume and a health check.
#
# Production posture:
#   - Builds the multi-stage Dockerfile's `runtime` target: compiled JS only,
#     dev dependencies pruned, no bind mount of host source.
#   - Runs the compiled entrypoints directly (node dist/…), so a fatal crash
#     exits the process and `restart: unless-stopped` recycles the container.
#     (Contrast with `tsx watch`, which keeps PID 1 alive after child death.)
#   - App container healthcheck probes /health; `docker compose up --wait`
#     only returns success once the app is genuinely serving traffic.
#
# Usage:
#   docker compose up -d --build
#
# For local development with hot-reload against Postgres on your host, use
# docker-compose.local.yml instead:
#   docker compose -f docker-compose.local.yml up -d --build

services:
  app:
    build:
      context: .
      target: runtime
    # Publish on host 3010 because 3000 is taken on the staging server. Inside
    # the container Express always listens on 3000 — see the PORT pin below.
    ports:
      - "3010:3000"
    # PORT and NODE_ENV are pinned here (not left to .env) so the
    # container-internal listen port can never drift from the right-hand side
    # of the `ports:` mapping above, and so the staging .env can't accidentally
    # flip the app into development mode. `environment:` is evaluated after
    # `env_file:`, so these always win over any value set in .env.
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/middleware_db?schema=linear
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    # Container-level healthcheck. Docker marks the container `unhealthy` if
    # /health stops returning 200; combined with `restart: unless-stopped`,
    # the container is recycled automatically. Also makes
    # `docker compose up --wait` wait for real readiness during deploys.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get({host:'127.0.0.1',port:process.env.PORT||3000,path:'/health',timeout:4000},r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    command: ["node", "dist/index.js"]

  worker:
    build:
      context: .
      target: runtime
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/middleware_db?schema=linear
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["node", "dist/worker.js"]

  postgres:
    # Pinned to 17-alpine (not 18) because postgres:18's Docker image changed
    # its expected mount path from /var/lib/postgresql/data to
    # /var/lib/postgresql (with data under a major-version subdir), which
    # would require wiping and re-initialising the pgdata volume. 17 is
    # supported through Nov 2029 and still receives patch releases via this
    # tag, so this is stability, not stagnation.
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=middleware_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d middleware_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
